<!-- @dsCard group="Slides" viewport="1000x750" name="05 · Timeline" subtitle="Timeline with orange nodes and labels" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slides.css">
</head>
<body>
<div class="slide light">
  <img class="s-logo" src="../assets/corporativo-logo.png" alt="corporativo." style="height:32px;width:auto;">

  <div style="position:absolute; top:120px; left:64px; right:64px;">
    <div class="s-eyebrow" style="margin-bottom:16px;"><span class="sec">Nuestra ruta</span><span class="bar"></span><span class="ttl">Línea de tiempo</span></div>
    <h1 class="s-title" style="font-size:42px; color:var(--qph-gray-700); margin-bottom:70px;">El camino del edificio</h1>

    <div style="position:relative;">
      <div style="position:absolute; left:0; right:0; top:9px; height:3px; background:var(--qph-border);"></div>
      <div style="position:absolute; left:0; width:75%; top:9px; height:3px; background:var(--qph-orange);"></div>
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px;">
        <div style="text-align:left;"><span class="dot" style="position:relative; display:block; width:20px; height:20px;"></span><div style="margin-top:18px; font-weight:900; color:var(--qph-orange); font-size:20px;">2021</div><p style="margin:6px 0 0; font-size:14px; color:var(--qph-gray-500); max-width:24ch;">Apertura del edificio y primeras empresas.</p></div>
        <div style="text-align:left;"><span class="dot" style="position:relative; display:block; width:20px; height:20px;"></span><div style="margin-top:18px; font-weight:900; color:var(--qph-orange); font-size:20px;">2023</div><p style="margin:6px 0 0; font-size:14px; color:var(--qph-gray-500); max-width:24ch;">Identidad de marca unificada (QPH).</p></div>
        <div style="text-align:left;"><span class="dot" style="position:relative; display:block; width:20px; height:20px;"></span><div style="margin-top:18px; font-weight:900; color:var(--qph-orange); font-size:20px;">2025</div><p style="margin:6px 0 0; font-size:14px; color:var(--qph-gray-500); max-width:24ch;">Sistema de comunicación por áreas.</p></div>
        <div style="text-align:left;"><span style="position:relative; display:block; width:20px; height:20px; border-radius:50%; border:3px solid var(--qph-orange); background:#fff; box-sizing:border-box;"></span><div style="margin-top:18px; font-weight:900; color:var(--qph-gray-300); font-size:20px;">2026</div><p style="margin:6px 0 0; font-size:14px; color:var(--qph-gray-500); max-width:24ch;">Transformación digital del edificio.</p></div>
      </div>
    </div>
  </div>

  <div class="s-pg">05</div>
</div>
</body>
</html>
