<!-- @dsCard group="Slides" viewport="1000x750" name="04 · Tarjetas" subtitle="Three-column cards with orange titles" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slides.css">
</head>
<body>
<div class="slide">
  <span class="arc" style="width:240px;height:240px;border-bottom-color:var(--qph-orange);bottom:-80px;left:-60px;transform:rotate(15deg);opacity:.5;"></span>
  <img class="s-logo" src="../assets/corporativo-logo-negativo.png" alt="corporativo." style="height:32px;width:auto;">

  <div style="position:absolute; top:118px; left:64px; right:64px;">
    <div class="s-eyebrow" style="margin-bottom:16px;"><span class="sec">Servicios</span><span class="bar"></span><span class="ttl">Qué ofrecemos</span></div>
    <h1 class="s-title" style="font-size:42px; color:#fff; margin-bottom:34px;">Tres frentes de trabajo</h1>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
      <div style="background:#fff; border-radius:14px; padding:24px;">
        <span style="display:grid;place-items:center;width:48px;height:48px;border-radius:12px;background:var(--qph-orange);margin-bottom:16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        </span>
        <h3 style="font-size:18px; text-transform:uppercase; font-weight:700; color:var(--qph-orange); margin:0 0 10px;">Gestión</h3>
        <p style="font-size:14px; color:var(--qph-gray-500); line-height:1.5; margin:0;">Administración central y soporte para todas las empresas del edificio.</p>
      </div>
      <div style="background:#fff; border-radius:14px; padding:24px;">
        <span style="display:grid;place-items:center;width:48px;height:48px;border-radius:12px;background:var(--qph-area-tecnologia);margin-bottom:16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
        </span>
        <h3 style="font-size:18px; text-transform:uppercase; font-weight:700; color:var(--qph-orange); margin:0 0 10px;">Tecnología</h3>
        <p style="font-size:14px; color:var(--qph-gray-500); line-height:1.5; margin:0;">Infraestructura, herramientas internas y seguridad de la información.</p>
      </div>
      <div style="background:#fff; border-radius:14px; padding:24px;">
        <span style="display:grid;place-items:center;width:48px;height:48px;border-radius:12px;background:var(--qph-area-salud);margin-bottom:16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/><path d="M3.22 13H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
        </span>
        <h3 style="font-size:18px; text-transform:uppercase; font-weight:700; color:var(--qph-orange); margin:0 0 10px;">Bienestar</h3>
        <p style="font-size:14px; color:var(--qph-gray-500); line-height:1.5; margin:0;">Salud, responsabilidad social y programas para los colaboradores.</p>
      </div>
    </div>
  </div>

  <div class="s-pg">04</div>
</div>
</body>
</html>
