<!-- @dsCard group="Slides" viewport="1000x750" name="03 · Galería" subtitle="Four-image gallery with orange corner numbers" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="slides.css">
</head>
<body>
<div class="slide light">
  <img class="s-logo" src="../assets/corporativo-logo.png" alt="corporativo." style="height:32px;width:auto;">

  <div style="position:absolute; top:120px; left:64px; right:64px;">
    <div class="s-eyebrow" style="margin-bottom:16px;"><span class="sec">Nuestros espacios</span><span class="bar"></span><span class="ttl">Galería</span></div>
    <h1 class="s-title" style="font-size:40px; color:var(--qph-gray-700); margin-bottom:28px;">Un recorrido por el edificio</h1>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
      <div>
        <div class="photo" style="height:170px; border-radius:12px;"><span class="ph-label">Recepción</span><span style="position:absolute; top:12px; left:12px;" class="numbadge">01</span></div>
        <p style="margin:8px 2px 0; font-size:14px; color:var(--qph-gray-500);">Recepción y acceso principal.</p>
      </div>
      <div>
        <div class="photo" style="height:170px; border-radius:12px;"><span class="ph-label">Coworking</span><span style="position:absolute; top:12px; left:12px;" class="numbadge">02</span></div>
        <p style="margin:8px 2px 0; font-size:14px; color:var(--qph-gray-500);">Áreas de trabajo compartidas.</p>
      </div>
      <div>
        <div class="photo" style="height:170px; border-radius:12px;"><span class="ph-label">Salas</span><span style="position:absolute; top:12px; left:12px;" class="numbadge">03</span></div>
        <p style="margin:8px 2px 0; font-size:14px; color:var(--qph-gray-500);">Salas de reuniones y eventos.</p>
      </div>
      <div>
        <div class="photo" style="height:170px; border-radius:12px;"><span class="ph-label">Terraza</span><span style="position:absolute; top:12px; left:12px;" class="numbadge">04</span></div>
        <p style="margin:8px 2px 0; font-size:14px; color:var(--qph-gray-500);">Terraza y espacios sociales.</p>
      </div>
    </div>
  </div>

  <div class="s-pg">03</div>
</div>
</body>
</html>
