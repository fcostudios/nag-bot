<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-bg-subtle); color: var(--qph-gray-700); padding: 24px; }
  .form { max-width: 460px; display: grid; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Switch, Button } = window.QPHDesignSystem_9bede0;
  function Demo() {
    return (
      <div className="form">
        <Input label="Nombre completo" placeholder="Ana Rafaela Ramírez" />
        <Select label="Área" defaultValue="Tecnología">
          <option>Administración</option>
          <option>Tecnología</option>
          <option>Nómina</option>
          <option>Salud</option>
        </Select>
        <Input label="Clave" type="password" error="Mínimo 8 caracteres" />
        <Switch defaultChecked label="Recibir comunicados internos" />
        <div className="row">
          <Button variant="primary">Enviar</Button>
          <Button variant="secondary">Cancelar</Button>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
