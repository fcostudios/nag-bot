<!-- @dsCard group="Type" viewport="700x160" name="Display headline" subtitle="Barlow Black 900, uppercase — the brandbook headline voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 24px 28px; }
  .display { font-weight: 900; font-size: 56px; line-height: .95; text-transform: uppercase; letter-spacing: -.01em; color: var(--qph-gray-700); }
  .display em { color: var(--qph-orange); font-style: normal; }
  .meta { margin-top: 14px; font-size: 12px; color: var(--qph-gray-300); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="display">Publishing <em>House</em></div>
    <div class="meta">Barlow Black · 900 · uppercase · --qph-text-4xl (3.5rem)</div>
  </div>
</body>
</html>
