<!-- @dsCard group="Colors" viewport="700x150" name="Brand orange" subtitle="The single general accent — actions, highlights, headlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 110px; padding: 12px; border-radius: 0; }
  .sw:first-child { border-radius: 8px 0 0 8px; }
  .sw:last-child { border-radius: 0 8px 8px 0; }
  .nm { font-weight: 700; font-size: 13px; }
  .hx { font-size: 12px; opacity: .85; text-transform: uppercase; letter-spacing: .03em; }
  .tk { font-size: 11px; opacity: .7; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--qph-orange); color:#fff;">
      <div class="nm">Naranja marca</div><div class="hx">#e7851a</div><div class="tk">--qph-orange</div>
    </div>
    <div class="sw" style="background:var(--qph-orange-600); color:#fff;">
      <div class="nm">Naranja 600</div><div class="hx">#c96f12</div><div class="tk">--qph-orange-600</div>
    </div>
    <div class="sw" style="background:var(--qph-orange-100); color:var(--qph-orange-600);">
      <div class="nm">Naranja 100</div><div class="hx">#fbe7cf</div><div class="tk">--qph-orange-100</div>
    </div>
  </div>
</body>
</html>
