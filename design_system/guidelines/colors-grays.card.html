<!-- @dsCard group="Colors" viewport="700x150" name="Corporate grays" subtitle="From the logo bars — structure, text, surfaces (never decoration)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 110px; padding: 12px; }
  .sw:first-child { border-radius: 8px 0 0 8px; }
  .sw:last-child { border-radius: 0 8px 8px 0; }
  .nm { font-weight: 700; font-size: 12px; }
  .hx { font-size: 11px; opacity: .85; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--qph-gray-100); color:var(--qph-gray-700);"><div class="nm">Gris 100</div><div class="hx">#c0bfc0</div></div>
    <div class="sw" style="background:var(--qph-gray-300); color:#fff;"><div class="nm">Gris 300</div><div class="hx">#949394</div></div>
    <div class="sw" style="background:var(--qph-gray-500); color:#fff;"><div class="nm">Gris 500</div><div class="hx">#787474</div></div>
    <div class="sw" style="background:var(--qph-gray-700); color:#fff;"><div class="nm">Gris 700</div><div class="hx">#595756</div></div>
    <div class="sw" style="background:var(--qph-ink); color:#fff;"><div class="nm">Ink</div><div class="hx">#3d3d3d</div></div>
    <div class="sw" style="background:var(--qph-black); color:#fff;"><div class="nm">Black</div><div class="hx">#1a1a1a</div></div>
  </div>
</body>
</html>
