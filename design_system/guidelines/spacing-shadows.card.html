<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows" subtitle="Gray-tinted elevation — sm, md, lg (never pure black)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 26px 28px; display: flex; gap: 32px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 130px; height: 64px; background: #fff; border-radius: 12px; }
  .sm { box-shadow: var(--qph-shadow-sm); }
  .md { box-shadow: var(--qph-shadow-md); }
  .lg { box-shadow: var(--qph-shadow-lg); }
  .lbl { font-size: 11px; color: var(--qph-gray-300); text-align: center; }
  .lbl b { color: var(--qph-gray-700); display: block; font-size: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box sm"></div><div class="lbl"><b>shadow-sm</b>cards at rest</div></div>
    <div class="col"><div class="box md"></div><div class="lbl"><b>shadow-md</b>raised / hover</div></div>
    <div class="col"><div class="box lg"></div><div class="lbl"><b>shadow-lg</b>overlays</div></div>
  </div>
</body>
</html>
