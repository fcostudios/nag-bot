<!-- @dsCard group="Colors" viewport="700x180" name="Area colors" subtitle="One color per corporate service — accent only, never mix with brand orange" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
  .sw { border-radius: 10px; padding: 12px; min-height: 58px; display: flex; flex-direction: column; justify-content: space-between; }
  .nm { font-weight: 700; font-size: 12px; line-height: 1.1; }
  .hx { font-size: 10px; opacity: .8; text-transform: uppercase; letter-spacing: .03em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--qph-area-responsabilidad-social); color:#fff;"><div class="hx">#8467da</div><div class="nm">Responsabilidad Social</div></div>
    <div class="sw" style="background:var(--qph-area-tecnologia); color:#fff;"><div class="hx">#241d79</div><div class="nm">Tecnología</div></div>
    <div class="sw" style="background:var(--qph-area-nomina); color:var(--qph-gray-700);"><div class="hx">#f9c021</div><div class="nm">Nómina</div></div>
    <div class="sw" style="background:var(--qph-area-proyectos-procesos); color:#fff;"><div class="hx">#253237</div><div class="nm">Proyectos y Procesos</div></div>
    <div class="sw" style="background:var(--qph-area-administracion); color:#fff;"><div class="hx">#e7851a</div><div class="nm">Administración</div></div>
    <div class="sw" style="background:var(--qph-area-seguridad-informacion); color:#fff;"><div class="hx">#003559</div><div class="nm">Seguridad de la Información</div></div>
    <div class="sw" style="background:var(--qph-area-salud); color:#fff;"><div class="hx">#15c0af</div><div class="nm">Salud</div></div>
  </div>
</body>
</html>
