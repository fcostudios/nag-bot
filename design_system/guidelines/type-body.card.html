<!-- @dsCard group="Type" viewport="700x180" name="Body & caption" subtitle="Barlow Regular for reading; italic for nuance; gray-300 captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 10px; }
  .lead { font-size: 18px; font-weight: 600; color: var(--qph-gray-700); }
  .body { font-size: 16px; line-height: 1.5; max-width: 56ch; color: var(--qph-gray-700); }
  .body em { font-style: italic; color: var(--qph-gray-500); }
  .caption { font-size: 14px; color: var(--qph-gray-300); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lead">Subtítulo destacado · Barlow SemiBold 600</div>
    <div class="body">Texto de lectura fácil en Barlow Regular. Ligeramente redonda, versátil y clara, ideal para párrafos largos en pantalla e impreso — <em>con matices en itálica cuando hace falta</em>.</div>
    <div class="caption">Pie de imagen / metadato secundario · Barlow Regular · --qph-text-sm</div>
  </div>
</body>
</html>
