<!-- @dsCard group="Type" viewport="700x170" name="Logo lettering" subtitle="The corporativo. wordmark is fixed artwork — never typeset it" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 28px; }
  .wrap img { height: 38px; width: auto; display: block; }
  .meta { margin-top: 14px; font-size: 12px; color: var(--qph-gray-300); }
  .warn { margin-top: 4px; font-size: 12px; color: var(--qph-orange-600); font-style: italic; }
</style>
</head>
<body>
  <div class="wrap">
    <img src="../assets/corporativo-logo.png" alt="corporativo.">
    <div class="meta">Wordmark artwork · use the PNG/SVG assets, never retype it. (Josefin Sans 300 = legacy QPH logo face, kept in tokens as --qph-font-logo.)</div>
    <div class="warn">No componer el logotipo con texto. Usar siempre el archivo original.</div>
  </div>
</body>
</html>
