<!-- @dsCard group="Type" viewport="700x150" name="Signature heading" subtitle="SECTION | TITLE — light gray label, orange bar, orange title, all caps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 26px 28px; }
  .eyebrow { display: flex; align-items: center; gap: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; font-size: 14px; }
  .eyebrow .sec { color: var(--qph-gray-300); }
  .eyebrow .bar { width: 3px; height: 1.1em; background: var(--qph-orange); }
  .eyebrow .ttl { color: var(--qph-orange); }
  .h1 { font-weight: 900; text-transform: uppercase; font-size: 40px; margin-top: 8px; color: var(--qph-gray-700); line-height: 1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow"><span class="sec">Tokens</span><span class="bar"></span><span class="ttl">Tipografía</span></div>
    <div class="h1">Barlow para todo</div>
  </div>
</body>
</html>
