<!-- @dsCard group="Brand" viewport="700x150" name="Brand elements" subtitle="Numeric badges, role pills (italic), area tags — signature marks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--qph-font-body); background: var(--qph-white); color: var(--qph-gray-700); }
  .wrap { padding: 26px 28px; display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .group { display: flex; align-items: center; gap: 10px; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 38px; height: 38px; background: var(--qph-orange); color: #fff; font-weight: 900; border-radius: var(--qph-radius-sm); padding: 0 6px; font-size: 18px; }
  .pill { border: 1px solid var(--qph-orange); color: var(--qph-orange); border-radius: 999px; padding: 5px 16px; font-size: 14px; font-style: italic; }
  .tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 5px 12px; border-radius: 999px; }
  .lbl { width: 100%; font-size: 11px; color: var(--qph-gray-300); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="group">
      <span class="badge">01</span><span class="badge">02</span><span class="badge">03</span>
    </div>
    <div class="group">
      <span class="pill">Consultor de RRHH</span>
    </div>
    <div class="group">
      <span class="tag" style="background:var(--qph-orange-100);color:var(--qph-orange-600);">Administración</span>
      <span class="tag" style="background:#e6e4f5;color:#241d79;">Tecnología</span>
      <span class="tag" style="background:#e7f7f4;color:#0e8f82;">Salud</span>
    </div>
    <div class="lbl">Numeric badge (Barlow Black on orange square) · role pill (italic, pill radius) · area tag chips</div>
  </div>
</body>
</html>
